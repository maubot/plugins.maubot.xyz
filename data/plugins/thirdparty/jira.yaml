name: maubot-jira
# A link to the Git repository.
repo: https://github.com/JadedBlueEyes/maubot-jira
# The SPDX license identifier for the plugin (same as in maubot.yaml)
license: MIT
# The author of the plugin.
author: JadedBlueEyes
# A short description for the plugin. May contain markdown.
description: Fetch previews of Jira tickets as they're mentioned in chat
